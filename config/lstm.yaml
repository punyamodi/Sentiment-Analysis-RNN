model:
  type: lstm
  vocab_size: 10000
  embedding_dim: 64
  maxlen: 200
  units:
    - 128
    - 64
  dropout: 0.4
  recurrent_dropout: 0.0

training:
  optimizer: adam
  loss: binary_crossentropy
  metrics:
    - accuracy
  epochs: 15
  batch_size: 128
  early_stopping_patience: 3
  reduce_lr_patience: 2
  reduce_lr_factor: 0.5
  min_lr: 1.0e-6

data:
  vocab_size: 10000
  maxlen: 200

paths:
  model_dir: models/saved
  log_dir: logs
  results_dir: results
